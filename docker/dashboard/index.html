<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/dashboard/static/js/tunnel-script.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        .background-section {
            width: 100%;
            height: 100vh; 
            background-image: url('Home_page.png');
            background-size: cover;
            background-position: center calc(50% - 50px); /* Permet d'ajuster la hauteur */
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }
        
        .title-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: #646d5f;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
            margin-top: 90px;
        }

        .overlay-links {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        .overlay-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            display: block;
            margin: 5px 0;
        }

        .overlay-links a:hover {
            text-decoration: underline;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        .content-section {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80%;
            margin: auto;
            padding: 50px;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
        }

        .content-image {
            width: 200px;
            height: auto;
            border-radius: 10px;
            margin-right: 20px;
        }

        .content-text {
            font-size: 1.2rem;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="background-section">
        <h1 class="title-text">Machine Spirit</h1>
        <div class="overlay-links">
            <a href="/phpmyadmin">PhpMyAdmin</a>
            <a href="#">HTTP Tunnel</a>
            <a href="#">HTTPS Tunnel</a>
        </div>
        
        <div class="content-section">
            <img src="tech_priest.png" alt="Tech Priest" class="content-image">
            <div class="content-text">
                <h2>Tech Priest</h2>
                <p>Les Tech-Priests sont les prêtres de l'Adeptus Mechanicus, gardiens du savoir technologique dans l'univers de Warhammer 40K.</p>
            </div>
        </div>
    </div>
</body>

</html>
