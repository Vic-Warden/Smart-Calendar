<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/dashboard/static/js/tunnel-script.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
        
        .background-section {
            width: 100%;
            height: 100vh; 
            background-image: url('Home_page.png');
            background-size: cover;
            background-position: center calc(50% - 140px);
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }
        
        .title-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: #646d5f;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
            margin-top: 90px;
        }

        .overlay-links {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
        }
        
        .overlay-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            display: block;
            margin: 5px 0;
        }

        .overlay-links a:hover {
            text-decoration: underline;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <div class="background-section">
        <h1 class="title-text">Machine Spirit</h1>
        <div class="overlay-links">
            <a href="/phpmyadmin">PhpMyAdmin</a>
            <a href="#">HTTP Tunnel</a>
            <a href="#">HTTPS Tunnel</a>
        </div>
    </div>
</body>

</html>
