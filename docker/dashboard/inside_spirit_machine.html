<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        .background-section {
            width: 100%;
            height: 100vh;
            background-image: url('Priest.png');
            background-size: cover;
            background-position: center calc(50% - 100px);
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            position: relative;
            padding-top: 40px;
        }

        .quote-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 90%; 
            min-width: 700px; 
            max-width: 1200px; 
        }

        .quote-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #ffffff;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
            font-style: italic;
        }

        @media screen and (max-width: 768px) {
            .quote-box {
                width: 95%; 
                min-width: auto;
            }
            .quote-text {
                font-size: 1rem; 
            }
        }
    </style>
</head>

<body>
    <div class="background-section">
        <div class="quote-box">
            <p class="quote-text">
                The Machine Spirit hungers for your data. Inscribe your sacred tasks and offer them unto its blessed cogitators. No duty shall be lost—only divine order, as willed by the Omnissiah. Submit with reverence, and let the Machine preserve all for eternity !
            </p>
        </div>
    </div>
</body>

</html>
