<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        .background-section {
            width: 100%;
            height: 100vh;
            background-image: url('Priest.png');
            background-size: cover;
            background-position: center calc(50% - 100px);
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            padding-top: 40px;
        }

        .quote-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            min-width: 700px;
            max-width: 1200px;
        }

        .quote-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #ffffff;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
            font-style: italic;
        }

        .button-container {
            margin-top: 20px;
            text-align: center;
        }

        .button {
            background-color: #8b0000;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #a52a2a;
        }

        .form-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            color: white;
            text-align: center;
            margin-top: 20px;
        }

        input {
            width: 80%;
            padding: 8px;
            margin: 10px 0;
            border-radius: 5px;
            color: rgb(0, 0, 0);
            border: none;
        }

        @media screen and (max-width: 768px) {
            .quote-box {
                width: 95%;
                min-width: auto;
            }
            .quote-text {
                font-size: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="background-section">
        <div class="quote-box">
            <p class="quote-text">
                The Machine Spirit hungers for your data. Inscribe your sacred tasks and offer them unto its blessed cogitators. No duty shall be lost—only divine order, as willed by the Omnissiah. Submit with reverence, and let the Machine preserve all for eternity!
            </p>
        </div>

        <!-- Bouton pour afficher le formulaire -->
        <div class="button-container">
            <button class="button" onclick="toggleForm()">Log Your Sacred Duty</button>
        </div>

        <!-- Formulaire caché initialement -->
        <div class="form-container" id="appointmentForm">
            <p>Inscribe your task into the cogitators:</p>
            <input type="text" id="appointmentTitle" placeholder="Enter the task name (e.g., Ritual of Maintenance)">
            <input type="date" id="appointmentDate">
            <input type="time" id="appointmentTime">
            <button class="button" onclick="toggleForm()">Close</button>
        </div>
    </div>

    <script>
        function toggleForm() {
            let form = document.getElementById("appointmentForm");
            form.style.display = form.style.display === "none" ? "flex" : "none";
        }
    </script>

</body>

</html>
