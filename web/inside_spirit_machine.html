<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

        .background-section {
            width: 100%;
            height: 100vh;
            background-image: url('Priest.png');
            background-size: cover;
            background-position: center calc(50% - 100px);
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            padding-top: 40px;
        }

        .quote-box {
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            width: 90%;
            min-width: 700px;
            max-width: 1200px;
            margin-bottom: 20px;
        }

        .quote-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: #ffffff;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.7);
            font-style: italic;
        }

        .button {
            background-color: #8b0000;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .button:hover {
            background-color: #a52a2a;
        }

        .appointments-container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            margin-top: 20px;
            color: white;
        }

        .appointment {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delete-button {
            background-color: red;
            border: none;
            color: white;
            padding: 5px;
            border-radius: 3px;
            cursor: pointer;
        }

        .delete-button:hover {
            background-color: darkred;
        }

        .form-container {
            display: none;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            color: white;
            text-align: center;
            margin-top: 10px;
        }

        input {
        color: black !important;
        }

        
    </style>
</head>

<body>
    <div class="background-section">
        <div class="quote-box">
            <p class="quote-text">
                The Machine Spirit hungers. Inscribe your sacred tasks, offer them with reverence, and let the Omnissiah’s will be done. The Machine forgets nothing!
            </p>
        </div>

        <button class="button" onclick="toggleForm()">Log Your Sacred Duty</button>

        <div class="form-container" id="appointmentForm">
            <input type="text" id="appointmentTitle" placeholder="Enter task..." required>
            <input type="datetime-local" id="appointmentDateTime" required>
            <button id="confirmDateTime" class="button" style="margin-top: 10px; display: none;">Confirm</button>

            <button class="button" onclick="addAppointment()">Sanctify this duty in the Omnissiah’s holy archive!</button>
        </div>
        
        <div class="appointments-container">
            <h3>Rites of Maintenance, Recorded for Eternity</h3>
            <div id="appointmentsList"></div>
        </div>
    </div>

    <script>
        function toggleForm() {
            let form = document.getElementById("appointmentForm");
            form.style.display = (form.style.display === "none" || form.style.display === "") ? "flex" : "none";
        }

        function addAppointment() {
            let title = document.getElementById("appointmentTitle").value;
            let dateTime = document.getElementById("appointmentDateTime").value;

            if (title.trim() === "" || dateTime.trim() === "") {
                alert("Please complete all fields.");
                return;
            }

            let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
            let appointment = { title, dateTime };
            appointments.push(appointment);
            localStorage.setItem("appointments", JSON.stringify(appointments));

            document.getElementById("appointmentTitle").value = "";
            document.getElementById("appointmentDateTime").value = "";
            toggleForm();
            loadAppointments();
        }

        function formatDateTime(dateTime) {
    let date = new Date(dateTime);
    let options = { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' };
    return date.toLocaleDateString('en-US', options);
}


        function loadAppointments() {
            let appointmentsList = document.getElementById("appointmentsList");
            appointmentsList.innerHTML = "";

            let appointments = JSON.parse(localStorage.getItem("appointments")) || [];

            appointments.forEach((appointment, index) => {
                let appointmentDiv = document.createElement("div");
                appointmentDiv.classList.add("appointment");
                appointmentDiv.innerHTML = `
    <span><strong>${appointment.title}</strong></span><br>
    <span>${formatDateTime(appointment.dateTime)}</span>
    <button class="delete-button" onclick="deleteAppointment(${index})">X</button>
`;

                appointmentsList.appendChild(appointmentDiv);
            });
        }

        function deleteAppointment(index) {
            let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
            appointments.splice(index, 1);
            localStorage.setItem("appointments", JSON.stringify(appointments));
            loadAppointments();
        }

        document.addEventListener("DOMContentLoaded", function() {
            loadAppointments();
        });

        document.addEventListener("DOMContentLoaded", function() {
            let dateTimeInput = document.getElementById("appointmentDateTime");
            let logButton = document.getElementById("toggleFormBtn");
            let form = document.getElementById("appointmentForm");
            let addButton = document.getElementById("addAppointmentBtn");

            if (dateTimeInput) {
                dateTimeInput.addEventListener("focus", function() {
                    this.showPicker && this.showPicker();
                });
            }

            if (logButton) {
                logButton.addEventListener("click", function() {
                    if (form) {
                        form.style.display = "flex";
                        logButton.style.display = "none";
                    }
                });
            }

            if (addButton) {
                addButton.addEventListener("click", function() {
                    let title = document.getElementById("appointmentTitle").value;
                    let dateTime = document.getElementById("appointmentDateTime").value;
                    
                    if (title.trim() === "" || dateTime.trim() === "") {
                        alert("Please complete all fields.");
                        return;
                    }
                    
                    setTimeout(() => {
                        if (form) form.style.display = "none";
                        if (logButton) logButton.style.display = "block";
                    }, 500);
                });
            }
        });

        document.addEventListener("DOMContentLoaded", function() {
    let dateTimeInput = document.getElementById("appointmentDateTime");
    let confirmButton = document.getElementById("confirmDateTime");

    if (dateTimeInput) {
        dateTimeInput.addEventListener("focus", function() {
            this.showPicker && this.showPicker();
            confirmButton.style.display = "block";
        });

        confirmButton.addEventListener("click", function() {
            confirmButton.style.display = "none";
        });
    }
});


        
    </script>
    
</body>

</html>
