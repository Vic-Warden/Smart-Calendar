<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="ism-background-section">
        <div class="ism-quote-box">
            <p class="ism-quote-text">
                The Machine Spirit hungers. Inscribe your sacred tasks, offer them with reverence, and let the Omnissiah’s will be done. The Machine forgets nothing !
            </p>
        </div>

        <button class="ism-button" onclick="ism_toggleForm()">Log Your Sacred Duty</button>

        <div class="ism-form-container" id="ism-appointmentForm">
            <input type="text" id="ism-appointmentTitle" placeholder="Enter task..." required>
            <input type="datetime-local" id="ism-appointmentDateTime" required>
            <button id="ism-confirmDateTime" class="ism-button" style="margin-top: 10px; display: none;">Confirm</button>

            <button class="ism-button" onclick="ism_addAppointment()">Sanctify this duty in the Omnissiah’s holy archive !</button>
        </div>
        
        <div class="ism-appointments-container">
            <h3>Rites of Maintenance, Recorded for Eternity</h3>
            <div id="ism-appointmentsList"></div>
        </div>
    </div>

    <div class="ism-edit-form">
        <label>Edit title:</label>
        <input type="text" id="ism-edit-title" value="Current Title">
    
        <label>Change date and time:</label>
        <input type="datetime-local" id="ism-edit-datetime" value="2025-03-07T20:45">
    
        <button onclick="ism_saveEditedAppointment(appointment_id)">Save</button>
        <button onclick="this.parentElement.remove()">Cancel</button>
    </div>
    

    <script src="script.js"></script>
</body>

</html>
