<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tactical Model Inspection</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
  <link rel="stylesheet" href="style.css">

  <!-- Three.js & STLLoader -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.141.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.141.0/examples/js/loaders/STLLoader.js"></script>
  <style>
    .decrypt-text {
      display: block;
      white-space: pre-wrap;
      font-family: 'Courier New', Courier, monospace;
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
      width: 100%;
      word-break: break-word;
    }

    .viewer-open-animation {
      animation: openViewer 0.5s ease-out;
    }

    @keyframes openViewer {
      from {
        transform: scale(0.95);
        opacity: 0;
      }
      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    .vibrate {
      animation: vibrate 0.2s linear;
    }

    @keyframes vibrate {
      0% { transform: translateX(0); }
      25% { transform: translateX(-1px); }
      50% { transform: translateX(1px); }
      75% { transform: translateX(-1px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body class="bg-black text-white font-mono">
  <!-- MAIN CONTENT -->
  <div class="ism-background-section">
    <div class="ism-quote-box">
      <p class="ism-quote-text">
        The Machine Spirit hungers. Inscribe your sacred tasks, offer them with reverence, and let the Omnissiah's will be done. The Machine forgets nothing!
      </p>
    </div>

    <button class="ism-button" onclick="ism_toggleForm()">Log Your Sacred Duty</button>

    <div class="ism-form-container" id="ism-appointmentForm">
      <input type="text" id="ism-appointmentTitle" placeholder="Enter task..." required>
      <input type="datetime-local" id="ism-appointmentDateTime" required>
      <button id="ism-confirmDateTime" class="ism-button" style="margin-top: 10px; display: none;">Confirm</button>
      <button class="ism-button" onclick="ism_addAppointment()">Sanctify this duty in the Omnissiah's holy archive!</button>
    </div>

    <div class="ism-appointments-container">
      <h3>Rites of Maintenance, Recorded for Eternity</h3>
      <div id="ism-appointmentsList"></div>
    </div>
  </div>

  <div class="ism-edit-form">
    <label>Edit title:</label>
    <input type="text" id="ism-edit-title" value="Current Title">
    <label>Change date and time:</label>
    <input type="datetime-local" id="ism-edit-datetime" value="2025-03-07T20:45">
    <button onclick="ism_saveEditedAppointment(appointment_id)">Save</button>
    <button onclick="this.parentElement.remove()">Cancel</button>
  </div>

  <!-- 3D VIEWER BUTTON -->
  <button onclick="toggleViewer()" class="fixed bottom-6 right-6 bg-blue-900 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded z-50 shadow-lg">
    [ASTRA MILITARUM] - Tactical Model Inspection
  </button>

  <!-- VIEWER CONTAINER -->
  <div id="viewer-container" style="display: none; position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.95); z-index: 9999;" class="flex flex-col items-center justify-center p-6 overflow-y-auto">
    <div class="flex flex-row gap-24 justify-center items-start w-full max-w-7xl">
      <!-- DYNAMIC CONTENT LEFT -->
      <div id="dynamic-content" class="w-[42rem] text-green-300">
        <h2 class="text-xl font-bold text-green-400 mb-4">Sensor-Driven Tactical Interface</h2>

        <div class="mb-6">
          <h3 class="text-green-400 text-lg font-bold mb-2">Photoresistor</h3>
          <p class="decrypt-text" data-text="When no light is detected, an assassin's voice warns that the Smart Calendar goes into silent mode :
Death comes in the shadows
Once the light returns, he announces :
The enemy knows my position..."></p>
        </div>

        <div class="mb-6">
          <h3 class="text-green-400 text-lg font-bold mb-2">PIR sensor</h3>
          <p class="decrypt-text" data-text="The guardmen see everything ! As soon as movement is detected, the system identifies a human presence and triggers an audible alarm."></p>
        </div>

        <div class="mb-6">
          <h3 class="text-green-400 text-lg font-bold mb-2">Button</h3>
          <p class="decrypt-text" data-text="This button toggles between the Astra Militarum characters: the Commissar, the Baneblade and the Leman Russ. It lets you change the voice lines when receiving appointments, and much more..."></p>
        </div>
      </div>

      <div id="three-canvas" class="border border-green-500 rounded-lg ml-auto" style="width: 500px; height: 500px;"></div>
    </div>

    <button onclick="toggleViewer()" class="mt-8 bg-green-700 hover:bg-green-600 text-white py-2 px-4 rounded">
      Close
    </button>
  </div>

  <script src="script.js"></script>

  <script>
    let scene, camera, renderer, mesh;

    function toggleViewer() {
      const container = document.getElementById('viewer-container');
      const isVisible = container.style.display === 'block';
      if (!isVisible) {
        container.classList.add('viewer-open-animation');
        container.style.display = 'block';
        initViewer();
        startDecryptAnimation();
      } else {
        container.style.display = 'none';
        container.classList.remove('viewer-open-animation');
      }
    }

    function initViewer() {
      const canvasDiv = document.getElementById('three-canvas');
      canvasDiv.innerHTML = '';

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
      camera.position.set(100, 100, 100); 
      camera.lookAt(0, 0, 0);

      renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setSize(500, 500);
      canvasDiv.appendChild(renderer.domElement);

      const loader = new THREE.STLLoader();
      loader.load('/models/Astra_Militarum_Explication.stl', function (geometry) {
        const material = new THREE.MeshStandardMaterial({ color: 0x00ff99 });
        mesh = new THREE.Mesh(geometry, material);

        mesh.rotation.set(-Math.PI / 2, 0, 0); 
        mesh.position.set(0, -20, 0);

        scene.add(mesh);
      });

      const ambient = new THREE.AmbientLight(0x404040, 1);
      scene.add(ambient);

      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(0, 0, 100).normalize();
      scene.add(light);

      animate();
    }

    function animate() {
      requestAnimationFrame(animate);
      if (mesh) {
        mesh.rotation.z += 0.001;
      }
      renderer.render(scene, camera);
    }

    function startDecryptAnimation() {
      const elements = document.querySelectorAll('.decrypt-text');
      elements.forEach(el => {
        const original = el.getAttribute('data-text');
        let display = Array.from(original).map(() => ' ');
        let i = 0;
        el.style.opacity = 1;

        const decryptInterval = setInterval(() => {
          for (let j = i; j < original.length; j++) {
            if (original[j] === '\n') {
              display[j] = '\n';
              continue;
            }
            display[j] = Math.random() > 0.5 ? String.fromCharCode(33 + Math.random() * 94) : display[j];
          }
          el.innerText = display.join('');
          display[i] = original[i];

          // Add vibration effect briefly
          el.classList.add('vibrate');
          setTimeout(() => el.classList.remove('vibrate'), 150);

          i++;
          if (i >= original.length) {
            el.innerText = original;
            clearInterval(decryptInterval);
          }
        }, 35);
      });
    }

    window.loadContent = () => {};
    window.toggleViewer = toggleViewer;
  </script>
</body>
</html>
